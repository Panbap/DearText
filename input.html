  <title>Nhập dữ liệu</title>
  <link rel="icon" href="https://github.com/Panbap/anh/blob/main/icon1.png?raw=true" type="image/png" />
  <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600" rel="stylesheet" />

<body>
  <div class="container">
    <h1>Nhập Dữ Liệu</h1>
    <form id="dataForm">
      <label>Thông điệp:</label>
      <div id="messageContainer" style="width: 100%;"></div>
      <div id="errorMessage"></div>
      <button type="button" class="add-line-btn" onclick="addMessageInput()">Thêm câu</button>

      <label for="music">Chọn nhạc:</label>
      <select id="music" name="music" required>
        <option value="" disabled selected>-- Chọn nhạc --</option>
        <option value="a.mp3">Nhac nền</option>
        <option value="s.mp3">Happy birthday</option>
        <option value="e.mp3">Lễ đường</option>
        <option value="t.mp3">Từng Ngày Yêu Em</option>
        <option value="c.mp3">Chạm vào mây</option>
      </select>

      <button type="submit">Tạo Link</button>
    </form>

    <div id="linkContainer">
      <button id="copyBtn" title="Copy link này">Copy</button>
      <input type="text" id="linkInput" readonly />
    </div

    <!-- Nút chuyển sang Donate và tạo QR -->
    <div
        style="text-align: center; font-size: 14px; color: #ff4444; user-select: none; margin-top: 15px; border: 1.5px dashed #ff4444; padding: 10px 15px; border-radius: 8px;">
        “Nếu bạn thấy trang này hữu ích, một chút ủng hộ từ bạn sẽ là niềm vui rất lớn đối với mình.” ☕❤️
    </div>

    <div style="display: flex; justify-content: center; gap: 20px; margin-top: 10px;">
        <button type="button" onclick="window.location.href='https://panbap.github.io/Donate/donate.html'"
            style="background-color: #ff6565; color: white; border: none; border-radius: 8px; padding: 12px 18px; cursor: pointer; font-family: 'Playpen Sans', cursive; font-weight: 600; transition: background-color 0.25s ease;">
            Ủng hộ
        </button>
        <button type="button" onclick="window.location.href='https://panbap.github.io/HeartQR/'"
            style="background-color: #ff6565; color: white; border: none; border-radius: 8px; padding: 12px 18px; cursor: pointer; font-family: 'Playpen Sans', cursive; font-weight: 600; transition: background-color 0.25s ease;">
            Tạo QR
        </button>
    </div>
  </div>
